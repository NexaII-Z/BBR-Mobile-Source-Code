name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Cache Unity Library ─────────────────────────────────────────────
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      # ── 3. Build Unity iOS Xcode project ──────────────────────────────────
      # game-ci handles Unity install, license activation, and build
      # all inside their pre-built Docker image — no manual setup needed
      - name: Build with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion:     2018.3.9f1
          targetPlatform:   iOS
          buildName:        BaldisBasicsClassic
          buildsPath:       builds

      # ── 4. Upload Xcode project ────────────────────────────────────────────
      # We upload the Xcode project — then a macOS job compiles it to IPA
      - name: Upload Xcode project
        uses: actions/upload-artifact@v4
        with:
          name: xcode-project
          path: builds/iOS
          retention-days: 1

  compile-ipa:
    name: Compile IPA
    runs-on: macos-latest
    needs: build

    steps:
      # ── 5. Download Xcode project ──────────────────────────────────────────
      - name: Download Xcode project
        uses: actions/download-artifact@v4
        with:
          name: xcode-project
          path: builds/iOS

      # ── 6. Build unsigned IPA ──────────────────────────────────────────────
      - name: Build unsigned IPA
        run: |
          XCODE_PROJECT=$(find builds/iOS -name "*.xcodeproj" | head -1)
          echo "Found: $XCODE_PROJECT"

          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme Unity-iPhone \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/BaldisBasics.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p $RUNNER_TEMP/Payload
          APP=$(find $RUNNER_TEMP/BaldisBasics.xcarchive/Products/Applications -name "*.app" | head -1)
          cp -r "$APP" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r BaldisBasicsClassic.ipa Payload/

      # ── 7. Upload IPA ──────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaldisBasicsClassic-iOS
          path: ${{ runner.temp }}/BaldisBasicsClassic.ipa
          retention-days: 14

  # ── 8. Return license ──────────────────────────────────────────────────────
  return-license:
    name: Return License
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Return Unity license
        uses: game-ci/unity-return-license@v2
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
